<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>富良野高校科学部</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7f4;
      color: #222;
      line-height: 1.7;
    }
    header {
      background: #2c5f3c;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }
    header h1 { margin: 0 0 0.5rem; font-size: 1.6rem; }
    nav a {
      color: white;
      margin: 0 0.8rem;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    nav a:hover { opacity: 1; text-decoration: underline; }
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    section { margin-bottom: 2.5rem; }
    h2 {
      border-left: 5px solid #2c5f3c;
      padding-left: 0.6rem;
      font-size: 1.3rem;
    }
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.2rem;
      margin-top: 1.2rem;
    }
    .report-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .report-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #ddd;
      display: block;
    }
    .report-card .content { padding: 1rem; }
    .report-card .date { font-size: 0.8rem; color: #777; }
    .report-card h3 { margin: 0.3rem 0 0.5rem; font-size: 1.05rem; }
    .report-card p { font-size: 0.9rem; margin: 0; color: #444; }
    .loading { color: #888; font-size: 0.9rem; }
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>富良野高校科学部</h1>
    <nav>
      <a href="/">ホーム</a>
      <a href="/about.html">活動紹介</a>
      <a href="/firefly.html">蛍マップ</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>最近の活動報告</h2>
      <div class="report-grid" id="report-grid">
        <p class="loading">読み込み中...</p>
      </div>
    </section>

    <section>
      <h2>このサイトについて</h2>
      <p>富良野高校科学部の活動を紹介するページです。蛍の生息地調査など、地域に根ざした研究を行っています。</p>
    </section>
  </main>

  <footer>
    &copy; 2026 富良野高校科学部
  </footer>

  <script>
    fetch('/reports.json')
      .then(res => res.json())
      .then(reports => {
        const grid = document.getElementById('report-grid');
        grid.innerHTML = '';

        // 日付が新しい順に並べる
        reports.sort((a, b) => new Date(b.date) - new Date(a.date));

        // 最新3件だけ表示
        reports.slice(0, 3).forEach(report => {
          const card = document.createElement('div');
          card.className = 'report-card';
          card.innerHTML = `
            <img src="/images/${report.image}" alt="${report.title}">
            <div class="content">
              <div class="date">${formatDate(report.date)}</div>
              <h3>${report.title}</h3>
              <p>${report.text}</p>
            </div>
          `;
          grid.appendChild(card);
        });
      })
      .catch(err => {
        document.getElementById('report-grid').innerHTML =
          '<p class="loading">活動報告を読み込めませんでした。</p>';
        console.error(err);
      });

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }
  </script>
</body>
</html>
